<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Shadow Challenge</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<body>

<div class="container" id="homeScreen">

    <h1>⚽ Football Shadow Challenge</h1>

    <p class="subtitle">
        Can you recognize the football player from only the silhouette?
    </p>

    <button id="startBtn">
        ▶ Start Game
    </button>

</div>

<div class="container" id="gameScreen" style="display:none;">

    <div class="top-bar">

        <div>❤️ <span id="life">3</span></div>

        <div>⭐ <span id="score">0</span></div>

    </div>

    <img
        id="playerImage"
        src="https://dummyimage.com/300x300/111111/ffffff&text=?"
        alt="Player"
    >

    <div class="answers">

        <button class="answer">Erling Haaland</button>

        <button class="answer">Kylian Mbappe</button>

        <button class="answer">Jude Bellingham</button>

        <button class="answer">Harry Kane</button>

    </div>

</div>

<script src="script.js"></script>

</body>

</body>
</html>
