<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Football IQ Challenge</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Home Screen -->

    <div class="container" id="homeScreen">

        <h1>⚽ Football IQ Challenge</h1>

        <p class="subtitle">

            Guess the football player before time runs out!

        </p>

        <button id="startBtn">

            ▶ Start Game

        </button>

    </div>



    <!-- Game Screen -->

    <div class="container" id="gameScreen" style="display:none;">

        <!-- Top Bar -->

        <div class="top-bar">

            <div class="life-box">

                ❤️ <span id="life">3</span>

            </div>

            <div class="score-box">

                ⭐ <span id="score">0</span>

            </div>

        </div>



        <!-- Timer -->

        <div class="progress">

            <div id="progressBar"></div>

        </div>



        <!-- Question Number -->

        <div class="questionNo">

            Question

            <span id="questionNumber">1</span>

            /

            <span id="totalQuestion">0</span>

        </div>



        <!-- Game Mode -->

        <div class="mode-box">

            <span id="gameMode">

                Blur Challenge

            </span>

        </div>



        <!-- Image -->

        <img

            id="playerImage"

            src=""

            alt="Football Player"

        >



        <!-- Result -->

        <h2 id="resultText"></h2>



        <!-- Answers -->

        <div class="answers">

            <button class="answer"></button>

            <button class="answer"></button>

            <button class="answer"></button>

            <button class="answer"></button>

        </div>

    </div>



    <!-- Reveal Screen -->

    <div id="revealScreen">

        <div class="reveal-card">

            <h1 id="revealTitle">

                ✅ Correct

            </h1>

            <img

                id="revealImage"

                src=""

                alt="Player"

            >

            <h2 id="revealName"></h2>

            <p id="nextText">

                Next Question...

            </p>

        </div>

    </div>



    <script src="js/players.js"></script>

    <script src="js/script.js"></script>

</body>

</html>
