<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football IQ Challenge</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="homeScreen">

    <h1>⚽ Football IQ Challenge</h1>

    <p class="subtitle">
        Can you guess the football player?
    </p>

    <button id="startBtn">
        ▶ Start Game
    </button>

</div>

<div class="container" id="gameScreen" style="display:none;">

    <div class="top-bar">

        <div>❤️ <span id="life">3</span></div>

        <div>⭐ <span id="score">0</span></div>

        <div>⏱ <span id="timer">15</span></div>

    </div>

    <img id="playerImage" src="" alt="Player">

    <h2 id="resultText"></h2>

    <div class="answers">

        <button class="answer" id="btn0"></button>

        <button class="answer" id="btn1"></button>

        <button class="answer" id="btn2"></button>

        <button class="answer" id="btn3"></button>

    </div>

</div>

<script src="questions.js"></script>
<script src="script.js"></script>

</body>
</html>
